# ==============================
# App Metadata
# ==============================
spring.config.import=optional:file:.env[.properties]
spring.application.name=${SPRING_APPLICATION_NAME}

# ==============================
# Database (Replace with actual DB info or inject via .env)
# ==============================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# ==============================
# JPA & Hibernate
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ==============================
# JWT
# ==============================
jwt.secret=${JWT_SECRET}
expiration.ms=${EXPIRATIONMS}

# ==============================
# Hikari Connection Pool (optional tuning)
# ==============================
spring.datasource.hikari.maximum-pool-size=1000
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# ==============================
# Logging (tweak as needed)
# ==============================
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=warn
logging.level.org.apache.pdfbox.pdmodel.font.PDType1Font=OFF
logging.level.org.apache.fontbox=OFF

# ==============================
# Actuator/Health (optional)
# ==============================
management.endpoint.health.show-details=always
management.health.db.enabled=true

clientid=${CLIENT_ID_GOOGLE}

# ==============================
# Cloudinary
# ==============================
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

# ==============================
# ALLOWED ORIGINS
# ==============================
app.cors.allowed-origins=${ALLOWED_ORIGINS}

# ==============================
# Google auth
# ==============================
google.clientid=${CLIENT_ID_GOOGLE}

# ==============================
# Github auth
# ==============================
github.clientid=${GITHUB_CLIENT_ID}
github.client.secret=${GITHUB_CLIENT_SECRET}

# ==============================
# Microservice
# ==============================
fastapi.url=${FASTAPI_URL}

# ==============================
# max-file-size
# ==============================
spring.servlet.multipart.max-file-size=150MB
spring.servlet.multipart.max-request-size=150MB

# ==============================
# mail sender properties
# ==============================
spring.mail.properties[mail.smtp.connectiontimeout]=5000
spring.mail.properties[mail.smtp.timeout]=3000
spring.mail.properties[mail.smtp.writetimeout]=5000
spring.mail.host=${PRIVATEEMAIL_HOST}
spring.mail.port=${PRIVATEEMAIL_PORT}
spring.mail.username=${PRIVATEEMAIL_EMAIL}
spring.mail.password=${PRIVATEEMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ==============================
# Frontend URL
# ==============================
frontend.url=${FRONTEND_URL}