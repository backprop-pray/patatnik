# ==============================
# App Metadata
# ==============================
spring.config.import=optional:file:.env[.properties]
spring.application.name=${SPRING_APPLICATION_NAME}

# ==============================
# Database (Replace with actual DB info or inject via .env)
# ==============================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# ==============================
# JPA & Hibernate
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ==============================
# JWT
# ==============================
jwt.secret=${JWT_SECRET}
expiration.ms=${EXPIRATIONMS}

# ==============================
# Hikari Connection Pool (optional tuning)
# ==============================
spring.datasource.hikari.maximum-pool-size=1000
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# ==============================
# Logging (tweak as needed)
# ==============================
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=warn
logging.level.org.apache.pdfbox.pdmodel.font.PDType1Font=OFF
logging.level.org.apache.fontbox=OFF

# ==============================
# Actuator/Health (optional)
# ==============================
management.endpoint.health.show-details=always
management.health.db.enabled=true

# ==============================
# Cloudinary
# ==============================
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

# ==============================
# ALLOWED ORIGINS
# ==============================
app.cors.allowed-origins=${ALLOWED_ORIGINS}


# ==============================
# max-file-size
# ==============================
spring.servlet.multipart.max-file-size=150MB
spring.servlet.multipart.max-request-size=150MB


ai.service.url=${PYTHON_SERVICE}