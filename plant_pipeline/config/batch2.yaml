batch2:
  backend: efficientad
  output_root: ./data/batch2
  write_anomaly_map: true
  anomaly_map_format: png
  roi_glob_pattern: "*.png"
efficientad:
  backend: efficientad
  dataset_root: ./data/datasets/roi_anomaly_general
  bundle_root: ./data/models/batch2_efficientad
  checkpoint_path: ""
  metadata_path: ""
  normal_train_dir: ./data/datasets/roi_anomaly_general/train/good
  val_good_dir: ./data/datasets/roi_anomaly_general/val/good
  val_bad_dir: ./data/datasets/roi_anomaly_general/val/bad
  test_good_dir: ./data/datasets/roi_anomaly_general/test/good
  test_bad_dir: ./data/datasets/roi_anomaly_general/test/bad
  external_root: ./data/external
  plantvillage_dir: ./data/external/PlantVillage-Dataset
  plantdoc_dir: ./data/external/PlantDoc-Dataset
  teacher_weights_dir: ./data/external/efficientad/pre_trained
  imagenette_dir: ./data/external/efficientad/imagenette
  image_size: 256
  center_crop:
  train_batch_size: 1
  eval_batch_size: 16
  num_workers: 0
  device: cpu
  model_name: efficientad
  model_version: efficientad-s-general-v1
  model_size: small
  teacher_out_channels: 384
  lr: 0.0001
  weight_decay: 0.00001
  padding: false
  pad_maps: true
  normalization_method: min_max
  max_epochs: 200
  max_steps: 70000
  seed: 42
  use_deterministic_demo_scorer: true
  deterministic_enabled: true
  leaf_min_area_ratio: 0.08
  min_leaf_coverage_for_confident_scoring: 0.18
  uncertain_on_weak_leaf_mask: true
  green_h_min: 25
  green_h_max: 105
  green_s_min: 35
  green_v_min: 35
  yellow_h_min: 8
  yellow_h_max: 42
  yellow_s_min: 45
  yellow_v_min: 45
  brown_h_min: 0
  brown_h_max: 28
  brown_s_min: 50
  brown_v_max: 190
  rust_h_min: 0
  rust_h_max: 18
  rust_s_min: 70
  rust_v_min: 45
  necrosis_s_min: 25
  necrosis_v_max: 95
  normal_max_lesion_ratio: 0.08
  suspicious_min_lesion_ratio: 0.2
patchcore:
  backend: patchcore
  dataset_root: ./data/datasets/roi_anomaly
  bundle_root: ./goshko/plant_pipeline/params
  checkpoint_path: ""
  metadata_path: ""
  normal_train_dir: ./data/datasets/roi_anomaly/train/good
  val_good_dir: ./data/datasets/roi_anomaly/val/good
  val_bad_dir: ./data/datasets/roi_anomaly/val/bad
  test_good_dir: ./data/datasets/roi_anomaly/test/good
  test_bad_dir: ./data/datasets/roi_anomaly/test/bad
  image_size: 224
  center_crop:
  train_batch_size: 8
  eval_batch_size: 8
  num_workers: 0
  backbone: wide_resnet50_2
  layers:
    - layer2
    - layer3
  coreset_sampling_ratio: 0.1
  num_neighbors: 9
  normalization_method: min_max
  device: cpu
  model_name: patchcore
  model_version: patchcore-wideresnet50-v1-runpod
  allow_inference_fallback: false
thresholds:
  lower_threshold: 0.2
  upper_threshold: 0.45
  normal_percentile: 0.95
  suspicious_percentile: 0.995
  min_gap: 0.05
  confidence_midpoint_weight: 1.0
  require_bad_validation: true
  min_val_good_count: 20
  min_val_bad_count: 20
api:
  host: 127.0.0.1
  port: 8001
  enable_api: false
