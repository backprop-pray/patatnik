name: Build & push patatnik container image

on:
  push:
    paths:
      - "CICD/Docker/patatnik-container/**"
      - ".github/workflows/build-gpu-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Show disk usage before cleanup
        run: df -h

      - name: Free up disk space on GitHub runner
        run: |
          echo "=== Before cleanup ==="
          df -h

          sudo swapoff -a || true
          sudo rm -f /swapfile || true

          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo rm -rf /home/linuxbrew/.linuxbrew || true

          sudo apt-get clean
          sudo docker system prune -af || true
          sudo docker builder prune -af || true

          echo "=== After cleanup ==="
          df -h

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set lowercase GHCR owner
        shell: bash
        run: echo "GHCR_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: ./CICD/Docker/patatnik-container
          file: ./CICD/Docker/patatnik-container/Dockerfile
          push: true
          pull: true
          no-cache: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/patatnik-container:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/patatnik-container:${{ github.sha }}
            ghcr.io/${{ env.GHCR_OWNER }}/patatnik-container:latest
            ghcr.io/${{ env.GHCR_OWNER }}/patatnik-container:${{ github.sha }}
